<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERMIRAV EXCHANGE — Curs Valutar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }

#display {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #000;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5vh 3vw 1.2vh;
  border-bottom: 2px solid #C9A84C;
  flex-shrink: 0;
}
.logo-name {
  font-family: 'Oswald', sans-serif;
  font-size: 4.8vw; font-weight: 900;
  color: #fff; letter-spacing: 2px;
  line-height: 1; text-transform: uppercase;
}
.logo-name span { color: #C9A84C; }
.logo-sub {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.5vw; color: rgba(255,255,255,0.45);
  letter-spacing: 3px; text-transform: uppercase; margin-top: 2px;
}
.header-mid { text-align: center; }
.live-badge {
  display: flex; align-items: center;
  justify-content: center; gap: 6px;
  font-family: 'Oswald', sans-serif;
  font-size: 1.6vw; font-weight: 700;
  letter-spacing: 4px; color: #C9A84C; text-transform: uppercase;
}
.dot {
  width: 9px; height: 9px; background: #3fb950;
  border-radius: 50%; animation: blink 1.5s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.sync-txt {
  font-size: 1.1vw; color: rgba(255,255,255,0.3);
  letter-spacing: 2px; margin-top: 3px;
  font-family: 'Roboto Condensed', sans-serif;
}
.sync-txt.ok { color: #3fb950; }
.sync-txt.err { color: #f85149; }
.clock-wrap { text-align: right; }
.clock {
  font-family: 'Oswald', sans-serif;
  font-size: 4.8vw; font-weight: 600;
  color: #C9A84C; letter-spacing: 3px; line-height: 1;
}
.date-txt {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.4vw; color: rgba(255,255,255,0.5);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}

/* COL HEADERS */
.col-headers {
  display: grid;
  grid-template-columns: 2.4fr 1fr 1fr;
  padding: 0.8vh 3vw;
  border-bottom: 1px solid rgba(201,168,76,0.35);
  flex-shrink: 0;
}
.col-h {
  font-family: 'Oswald', sans-serif;
  font-size: 2vw; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; text-align: center;
}
.col-h:first-child { text-align: left; color: rgba(255,255,255,0.4); }
.col-h.buy { color: #3fb950; }
.col-h.sell { color: #C9A84C; }

/* RATES TABLE */
.rates-table {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0.4vh 3vw;
  overflow: hidden;
}
.rate-row {
  display: grid;
  grid-template-columns: 2.4fr 1fr 1fr;
  align-items: center;
  flex: 1;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 0.5vw;
}
.rate-row:last-child { border-bottom: none; }

.currency-cell {
  display: flex;
  align-items: center;
  gap: 1.8vw;
}

/* FLAG — dreptunghi clar cu steag SVG */
.flag-wrap {
  width: 6vw;
  height: 4vw;
  flex-shrink: 0;
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 1.5px rgba(255,255,255,0.2);
  background: #111;
}
.flag-wrap svg {
  width: 100%;
  height: 100%;
  display: block;
}

.currency-name {
  font-family: 'Oswald', sans-serif;
  font-size: 2.5vw; font-weight: 700;
  color: #fff; letter-spacing: 0.5px;
}

.rate-cell { text-align: center; }
.rate-val {
  font-family: 'Oswald', sans-serif;
  font-size: 2.8vw; font-weight: 800;
  letter-spacing: 1px; display: block;
}
.rate-val.buy { color: #3fb950; }
.rate-val.sell { color: #e8c96a; }

/* FOOTER */
.footer {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.8vh 3vw;
  border-top: 1px solid rgba(201,168,76,0.3);
  flex-shrink: 0;
}
.footer-left {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.2vw; color: rgba(255,255,255,0.35);
  letter-spacing: 2px; text-transform: uppercase;
}
.footer-right {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.2vw; color: rgba(201,168,76,0.45);
  letter-spacing: 2px; text-transform: uppercase;
}

/* ADMIN BTN */
.admin-btn {
  position: fixed; bottom: 10px; right: 10px;
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.15);
  color: rgba(201,168,76,0.35);
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 9px; letter-spacing: 2px;
  padding: 5px 11px; border-radius: 20px;
  cursor: pointer; text-transform: uppercase; z-index: 999;
}

/* PWD OVERLAY */
#pwd-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.97); z-index: 2000;
  justify-content: center; align-items: center;
}
#pwd-overlay.show { display: flex; }
.pwd-box {
  background: #0a0a0a; border: 1px solid #C9A84C;
  border-radius: 16px; padding: 36px 40px;
  text-align: center; width: 300px;
}
.pwd-title {
  font-family: 'Oswald', sans-serif; font-size: 18px;
  color: #C9A84C; letter-spacing: 3px;
  margin-bottom: 6px; text-transform: uppercase;
}
.pwd-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
.pwd-input {
  width: 100%; background: #000;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #fff;
  font-size: 22px; padding: 10px;
  text-align: center; letter-spacing: 8px;
  margin-bottom: 14px; font-family: 'Oswald', sans-serif;
}
.pwd-input:focus { outline: none; border-color: #C9A84C; }
.pwd-btn {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg,#C9A84C,#a8832e);
  border: none; border-radius: 8px; color: #000;
  font-family: 'Oswald', sans-serif; font-size: 14px;
  font-weight: 900; letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
}
.pwd-error { font-size: 12px; color: #f85149; margin-top: 8px; min-height: 18px; }
.pwd-cancel {
  background: none; border: none; color: rgba(255,255,255,0.3);
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; margin-top: 10px;
  font-family: 'Roboto Condensed', sans-serif;
}

/* ADMIN PANEL */
#admin {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.96); z-index: 1000;
  overflow-y: auto; padding: 20px 16px;
}
.admin-panel {
  max-width: 560px; margin: 0 auto;
  background: #0a0a0a; border-radius: 14px;
  border: 1px solid #C9A84C; overflow: hidden;
}
.admin-header {
  background: rgba(201,168,76,0.08); padding: 16px 24px;
  border-bottom: 1px solid rgba(201,168,76,0.3);
  display: flex; justify-content: space-between; align-items: center;
}
.admin-title {
  font-family: 'Oswald', sans-serif; font-size: 18px;
  font-weight: 800; color: #C9A84C; letter-spacing: 2px;
}
.admin-close {
  background: rgba(255,255,255,0.08); border: none; color: #fff;
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 15px;
}
.admin-body { padding: 14px 24px; }
.admin-row-header {
  display: grid; grid-template-columns: 1.8fr 1fr 1fr;
  gap: 8px; padding: 4px 10px; margin-bottom: 4px;
}
.admin-col-label {
  font-size: 10px; font-weight: 900; letter-spacing: 3px;
  color: #C9A84C; text-transform: uppercase; text-align: center;
}
.admin-col-label:first-child { text-align: left; }
.admin-row {
  display: grid; grid-template-columns: 1.8fr 1fr 1fr;
  gap: 8px; align-items: center; margin-bottom: 7px;
  padding: 8px 10px; background: rgba(255,255,255,0.03);
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
}
.admin-currency-name {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 900; color: #fff;
}
.admin-flag {
  width: 26px; height: 17px; flex-shrink: 0;
  border-radius: 2px; overflow: hidden;
}
.admin-flag svg { width: 100%; height: 100%; display: block; }
.admin-input {
  background: #000; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: #fff;
  font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
  padding: 7px 8px; text-align: center; width: 100%;
}
.admin-input:focus { outline: none; border-color: #C9A84C; }
.admin-save-btn {
  width: 100%; margin-top: 14px; padding: 13px;
  background: linear-gradient(135deg,#C9A84C,#a8832e);
  border: none; border-radius: 10px; color: #000;
  font-family: 'Oswald', sans-serif; font-size: 15px;
  font-weight: 900; letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
}
.admin-save-btn:disabled { opacity: 0.5; }
.save-confirm {
  text-align: center; margin-top: 8px; font-size: 12px;
  letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; min-height: 18px;
}
.save-confirm.show { opacity: 1; }
.save-confirm.ok { color: #3fb950; }
.save-confirm.err { color: #f85149; }
</style>
</head>
<body>

<div id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-title">Admin Access</div>
    <div class="pwd-sub">Introduceți parola pentru a modifica cursurile</div>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••" maxlength="20">
    <button class="pwd-btn" onclick="checkPassword()">Intră</button>
    <div class="pwd-error" id="pwd-error"></div><br>
    <button class="pwd-cancel" onclick="closePwd()">Anulează</button>
  </div>
</div>

<div id="display">
  <div class="header">
    <div>
      <div class="logo-name">SERMIRAV <span>EXCHANGE</span></div>
      <div class="logo-sub">Râmnicu Vâlcea · Schimb Valutar</div>
    </div>
    <div class="header-mid">
      <div class="live-badge"><span class="dot"></span>Curs Live</div>
      <div class="sync-txt" id="syncStatus">se conectează...</div>
    </div>
    <div class="clock-wrap">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-txt" id="datedisp">--</div>
    </div>
  </div>

  <div class="col-headers">
    <div class="col-h">Valută</div>
    <div class="col-h buy">Cumpărăm</div>
    <div class="col-h sell">Vindem</div>
  </div>

  <div class="rates-table" id="ratesTable"></div>

  <div class="footer">
    <div class="footer-left">Cursurile sunt orientative și pot fi negociate</div>
    <div class="footer-right">Sermirav Exchange · Râmnicu Vâlcea</div>
  </div>
</div>

<button class="admin-btn" onclick="openPwd()">⚙ Admin</button>

<div id="admin">
  <div class="admin-panel">
    <div class="admin-header">
      <div><div class="admin-title">⚙ Modifică Cursuri</div></div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">
      <div class="admin-row-header">
        <div class="admin-col-label">Valută</div>
        <div class="admin-col-label" style="color:#3fb950">Cumpărăm</div>
        <div class="admin-col-label" style="color:#C9A84C">Vindem</div>
      </div>
      <div id="adminRows"></div>
      <button class="admin-save-btn" id="adminSaveBtn" onclick="saveRates()">✓ Salvează Cursurile</button>
      <div class="save-confirm" id="saveConfirm"></div>
    </div>
  </div>
</div>

const ADMIN_PASSWORD = '2580';

const NAMES = {
  EUR:'Euro', USD:'Dolar American', GBP:'Lira Sterlina',
  CHF:'Franc Elvetian', CAD:'Dolar Canadian', AUD:'Dolar Australian',
  PLN:'Zlot Polonez', BGN:'Leva Bulgareasca', TRY:'Lira Turceasca', HUF:'Forint Maghiar'
};

let CURRENCIES = [
  { code:'EUR', buy:5.1260, sell:5.2100 },
  { code:'USD', buy:4.3340, sell:4.4440 },
  { code:'GBP', buy:5.8230, sell:6.0400 },
  { code:'CHF', buy:5.5970, sell:5.7100 },
  { code:'CAD', buy:3.0750, sell:3.3000 },
  { code:'AUD', buy:2.7620, sell:3.1000 },
  { code:'PLN', buy:1.1450, sell:1.2200 },
  { code:'BGN', buy:2.2500, sell:2.6660 },
  { code:'TRY', buy:0.0950, sell:0.1190 },
  { code:'HUF', buy:0.0130, sell:0.0141 },
];

onValue(ratesRef, (snapshot) => {
  const data = snapshot.val();
  if (data && Array.isArray(data)) {
    data.forEach(r => {
      const idx = CURRENCIES.findIndex(c => c.code === r.code);
      if (idx >= 0) {
        CURRENCIES[idx].buy = r.buy;
        CURRENCIES[idx].sell = r.sell;
        const buyEl = document.getElementById('buy-' + idx);
        const sellEl = document.getElementById('sell-' + idx);
        if (buyEl) { buyEl.textContent = r.buy.toFixed(4); sellEl.textContent = r.sell.toFixed(4); }
      }
    });
    const now = new Date();
    document.getElementById('syncStatus').textContent =
      `actualizat ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    document.getElementById('syncStatus').className = 'sync-txt ok';
  }
}, () => {
  document.getElementById('syncStatus').textContent = 'eroare conectare';
  document.getElementById('syncStatus').className = 'sync-txt err';
});

function renderDisplay() {
  const table = document.getElementById('ratesTable');
  table.innerHTML = '';
  CURRENCIES.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'rate-row';
    row.innerHTML = `
      <div class="currency-cell">
        <div class="flag-wrap">${FLAGS[c.code] || ''}</div>
        <div class="currency-name">${NAMES[c.code] || c.code}</div>
      </div>
      <div class="rate-cell"><span class="rate-val buy" id="buy-${i}">${c.buy.toFixed(4)}</span></div>
      <div class="rate-cell"><span class="rate-val sell" id="sell-${i}">${c.sell.toFixed(4)}</span></div>
    `;
    table.appendChild(row);
  });
}

function renderAdmin() {
  const container = document.getElementById('adminRows');
  container.innerHTML = '';
  CURRENCIES.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'admin-row';
    row.innerHTML = `
      <div class="admin-currency-name">
        <div class="admin-flag">${FLAGS[c.code] || ''}</div>
        <span>${NAMES[c.code] || c.code}</span>
      </div>
      <input type="number" class="admin-input" id="adm-buy-${i}" value="${c.buy.toFixed(4)}" step="0.0001" min="0">
      <input type="number" class="admin-input" id="adm-sell-${i}" value="${c.sell.toFixed(4)}" step="0.0001" min="0">
    `;
    container.appendChild(row);
  });
}

window.saveRates = async function() {
  const btn = document.getElementById('adminSaveBtn');
  const confirmEl = document.getElementById('saveConfirm');
  btn.disabled = true; btn.textContent = '⏳ Se salvează...';
  const newRates = CURRENCIES.map((c, i) => ({
    code: c.code,
    buy: parseFloat(document.getElementById('adm-buy-' + i).value) || c.buy,
    sell: parseFloat(document.getElementById('adm-sell-' + i).value) || c.sell,
  }));
  try {
    await set(ratesRef, newRates);
    confirmEl.textContent = '✓ CURSURI SALVATE!';
    confirmEl.className = 'save-confirm show ok';
  } catch(e) {
    confirmEl.textContent = '✕ Eroare: ' + e.message;
    confirmEl.className = 'save-confirm show err';
  }
  btn.disabled = false; btn.textContent = '✓ Salvează Cursurile';
  setTimeout(() => confirmEl.classList.remove('show'), 5000);
};

window.openPwd = function() {
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').textContent = '';
  document.getElementById('pwd-overlay').classList.add('show');
};
window.closePwd = function() { document.getElementById('pwd-overlay').classList.remove('show'); };
window.checkPassword = function() {
  if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) {
    window.closePwd(); renderAdmin(); document.getElementById('admin').style.display = 'block';
  } else {
    document.getElementById('pwd-error').textContent = '✕ Parolă incorectă';
    document.getElementById('pwd-input').value = '';
  }
};
window.closeAdmin = function() { document.getElementById('admin').style.display = 'none'; };

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('pwd-overlay').classList.contains('show')) window.checkPassword();
  if (e.key === 'Escape') { window.closePwd(); window.closeAdmin(); }
});

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const days = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const months = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('datedisp').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

renderDisplay();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
