<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERMIRAV EXCHANGE — Curs Valutar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#FFF; }

#display {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #FFF;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2vh 3vw 1.5vh;
  border-bottom: 3px solid #000;
  flex-shrink: 0;
}
.logo-name {
  font-family: 'Oswald', sans-serif;
  font-size: 5.2vw; font-weight: 900;
  color: #000; letter-spacing: 2px;
  line-height: 1; text-transform: uppercase;
}
.logo-name span { color: #008000; }
.logo-sub {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.6vw; color: #444;
  letter-spacing: 3px; text-transform: uppercase; margin-top: 4px;
  font-weight: 700;
}
.header-mid { text-align: center; }
.live-badge {
  display: flex; align-items: center;
  justify-content: center; gap: 6px;
  font-family: 'Oswald', sans-serif;
  font-size: 1.8vw; font-weight: 900;
  letter-spacing: 4px; color: #000; text-transform: uppercase;
}
.dot {
  width: 12px; height: 12px; background: #00FF00;
  border: 2px solid #000;
  border-radius: 50%; animation: blink 1.5s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.sync-txt {
  font-size: 1.3vw; color: #666;
  letter-spacing: 2px; margin-top: 3px;
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 700;
}
.sync-txt.ok { color: #008000; }
.sync-txt.err { color: #FF0000; }
.clock-wrap { text-align: right; }
.clock {
  font-family: 'Oswald', sans-serif;
  font-size: 5.5vw; font-weight: 700;
  color: #000; letter-spacing: 3px; line-height: 1;
}
.date-txt {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.5vw; color: #555;
  letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
  font-weight: 700;
}

/* COL HEADERS */
.col-headers {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  padding: 1.2vh 3vw;
  border-bottom: 2px solid #000;
  background: #F5F5F5;
  flex-shrink: 0;
}
.col-h {
  font-family: 'Oswald', sans-serif;
  font-size: 2.8vw; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase; text-align: center;
}
.col-h:first-child { text-align: left; color: #000; padding-left: 2vw; }
.col-h.buy { color: #008000; }
.col-h.sell { color: #FF0000; }

/* RATES TABLE */
.rates-table {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0.5vh 3vw;
  overflow: hidden;
}
.rate-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  align-items: center;
  flex: 1;
  border-bottom: 2px solid #E5E5E5;
  padding: 0 0.5vw;
}
.rate-row:last-child { border-bottom: none; }

.currency-cell {
  display: flex;
  align-items: center;
  justify-content: flex-start;
}

/* CONTAINER STEAG CU TEXT PESTE */
.flag-container {
  position: relative;
  width: 14vw;
  height: 8.5vw;
  flex-shrink: 0;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 0 0 2.5px #000;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.flag-container svg {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}
.flag-text {
  position: absolute;
  font-family: 'Oswald', sans-serif;
  font-size: 3.5vw;
  font-weight: 900;
  color: #000;
  background: rgba(255, 255, 255, 0.85);
  padding: 0 1.5vw;
  border-radius: 4px;
  border: 1.5px solid #000;
  letter-spacing: 1px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.rate-cell { text-align: center; }
.rate-val {
  font-family: 'Oswald', sans-serif;
  font-size: 4.8vw; font-weight: 900;
  letter-spacing: 1px; display: block;
}
.rate-val.buy { color: #008000; }
.rate-val.sell { color: #FF0000; }

/* FOOTER */
.footer {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 1.2vh 3vw;
  border-top: 3px solid #000;
  background: #F5F5F5;
  flex-shrink: 0;
}
.footer-left {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.5vw; color: #000;
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700;
}
.footer-right {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 1.5vw; color: #000;
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700;
}

/* ADMIN BTN */
.admin-btn {
  position: fixed; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.2);
  color: #000;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 10px; letter-spacing: 2px;
  padding: 6px 14px; border-radius: 20px;
  cursor: pointer; text-transform: uppercase; z-index: 999;
  font-weight: 700;
}

/* PWD OVERLAY & ADMIN PANEL (Rămân neschimbate pentru funcționalitate) */
#pwd-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.98); z-index: 2000;
  justify-content: center; align-items: center;
}
#pwd-overlay.show { display: flex; }
.pwd-box {
  background: #FFF; border: 2px solid #000;
  border-radius: 16px; padding: 36px 40px;
  text-align: center; width: 320px;
}
.pwd-title { font-family: 'Oswald', sans-serif; font-size: 22px; color: #000; text-transform: uppercase; font-weight: 900; }
.pwd-input { width: 100%; background: #FFF; border: 2px solid #000; border-radius: 8px; color: #000; font-size: 24px; padding: 10px; text-align: center; font-family: 'Oswald', sans-serif; font-weight: 700; }
.pwd-btn { width: 100%; padding: 12px; background: #000; border: none; border-radius: 8px; color: #FFF; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
#admin { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; overflow-y: auto; padding: 20px 16px; }
.admin-panel { max-width: 580px; margin: 0 auto; background: #FFF; border-radius: 14px; border: 2px solid #000; overflow: hidden; }
.admin-header { background: #F5F5F5; padding: 18px 24px; border-bottom: 2px solid #000; display: flex; justify-content: space-between; align-items: center; }
.admin-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 900; color: #000; }
.admin-close { background: #000; border: none; color: #FFF; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
.admin-body { padding: 16px 24px; }
.admin-row-header { display: grid; grid-template-columns: 1.8fr 1fr 1fr; gap: 8px; padding: 4px 10px; }
.admin-row { display: grid; grid-template-columns: 1.8fr 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 8px; padding: 10px; background: #F9F9F9; border-radius: 8px; border: 1px solid #DDD; }
.admin-input { background: #FFF; border: 2px solid #000; border-radius: 6px; color: #000; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; padding: 8px; text-align: center; width: 100%; }
.admin-save-btn { width: 100%; margin-top: 16px; padding: 14px; background: #000; border: none; border-radius: 10px; color: #FFF; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
.save-confirm { text-align: center; margin-top: 10px; font-size: 14px; opacity: 0; min-height: 18px; font-family: 'Oswald', sans-serif; font-weight: 900; }
.save-confirm.show { opacity: 1; } .save-confirm.ok { color: #008000; }
</style>
</head>
<body>

<div id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-title">Admin Access</div>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••" maxlength="20">
    <button class="pwd-btn" onclick="checkPassword()">Intră</button>
    <div class="pwd-error" id="pwd-error"></div>
  </div>
</div>

<div id="display">
  <div class="header">
    <div>
      <div class="logo-name">SERMIRAV <span>EXCHANGE</span></div>
      <div class="logo-sub">Râmnicu Vâlcea · Schimb Valutar</div>
    </div>
    <div class="header-mid">
      <div class="live-badge"><span class="dot"></span>Curs Live</div>
      <div class="sync-txt" id="syncStatus">se conectează...</div>
    </div>
    <div class="clock-wrap">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-txt" id="datedisp">--</div>
    </div>
  </div>

  <div class="col-headers">
    <div class="col-h">Valută</div>
    <div class="col-h buy">Cumpărăm</div>
    <div class="col-h sell">Vindem</div>
  </div>

  <div class="rates-table" id="ratesTable"></div>

  <div class="footer">
    <div class="footer-left">Cursurile sunt orientative și pot fi negociate</div>
    <div class="footer-right">Sermirav Exchange · Râmnicu Vâlcea</div>
  </div>
</div>

<button class="admin-btn" onclick="openPwd()">⚙ Admin</button>

<div id="admin">
  <div class="admin-panel">
    <div class="admin-header">
      <div class="admin-title">⚙ Modifică Cursuri</div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">
      <div class="admin-row-header">
        <div style="font-size:12px; font-weight:900; color:#000;">Valută</div>
        <div style="font-size:12px; font-weight:900; color:#008000; text-align:center;">Cumpărăm</div>
        <div style="font-size:12px; font-weight:900; color:#FF0000; text-align:center;">Vindem</div>
      </div>
      <div id="adminRows"></div>
      <button class="admin-save-btn" id="adminSaveBtn" onclick="saveRates()">✓ Salvează Cursurile</button>
      <div class="save-confirm" id="saveConfirm"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7K-y9cX-fPbpGOetaCTwe8G8gpMy-ML0",
  authDomain: "sermirav-exchange.firebaseapp.com",
  databaseURL: "https://sermirav-exchange-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sermirav-exchange",
  storageBucket: "sermirav-exchange.firebasestorage.app",
  messagingSenderId: "913088674029",
  appId: "1:913088674029:web:8c3a77e3c5f5925a7fb4e4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ratesRef = ref(db, 'rates');
const ADMIN_PASSWORD = '2580';

const FLAGS = {
  EUR: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
    <rect width="900" height="600" fill="#003399"/>
    <g fill="#FFCC00">
      <polygon points="450,100 461,134 497,134 469,155 480,189 450,168 420,189 431,155 403,134 439,134" id="star"/>
      <use href="#star" transform="rotate(30,450,300)"/>
      <use href="#star" transform="rotate(60,450,300)"/>
      <use href="#star" transform="rotate(90,450,300)"/>
      <use href="#star" transform="rotate(120,450,300)"/>
      <use href="#star" transform="rotate(150,450,300)"/>
      <use href="#star" transform="rotate(180,450,300)"/>
      <use href="#star" transform="rotate(210,450,300)"/>
      <use href="#star" transform="rotate(240,450,300)"/>
      <use href="#star" transform="rotate(270,450,300)"/>
      <use href="#star" transform="rotate(300,450,300)"/>
      <use href="#star" transform="rotate(330,450,300)"/>
    </g>
  </svg>`,

  USD: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 100">
    <rect width="190" height="100" fill="#B22234"/>
    <rect y="14" width="190" height="8" fill="#fff"/><rect y="29" width="190" height="8" fill="#fff"/>
    <rect y="44" width="190" height="8" fill="#fff"/><rect y="59" width="190" height="8" fill="#fff"/>
    <rect y="74" width="190" height="8" fill="#fff"/><rect y="89" width="190" height="8" fill="#fff"/>
    <rect width="76" height="54" fill="#3C3B6E"/>
    <g fill="#fff">
      <circle cx="6" cy="5" r="3"/><circle cx="16" cy="5" r="3"/><circle cx="26" cy="5" r="3"/>
      <circle cx="36" cy="5" r="3"/><circle cx="46" cy="5" r="3"/><circle cx="56" cy="5" r="3"/><circle cx="66" cy="5" r="3"/>
    </g>
  </svg>`,

  GBP: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
    <rect width="60" height="30" fill="#012169"/>
    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="7"/>
    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4.5"/>
    <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="11"/>
    <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6.5"/>
  </svg>`,

  CHF: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 20">
    <rect width="32" height="20" fill="#FF0000"/>
    <rect x="13.5" y="4" width="5" height="12" fill="#fff"/>
    <rect x="9" y="7.5" width="14" height="5" fill="#fff"/>
  </svg>`,

  CAD: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <rect width="600" height="400" fill="#fff"/>
    <rect width="150" height="400" fill="#FF0000"/>
    <rect x="450" width="150" height="400" fill="#FF0000"/>
    <path d="M300,70 L315,120 L370,120 L325,155 L342,205 L300,172 L258,205 L275,155 L230,120 L285,120 Z" fill="#FF0000"/>
  </svg>`,

  AUD: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
    <rect width="60" height="30" fill="#00008B"/>
    <path d="M0,0 L30,15 M30,0 L0,15" stroke="#fff" stroke-width="5"/>
    <path d="M0,0 L30,15 M30,0 L0,15" stroke="#CC0001" stroke-width="3"/>
    <path d="M15,0 V15 M0,7.5 H30" stroke="#fff" stroke-width="9"/>
  </svg>`,

  PLN: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 10">
    <rect width="16" height="10" fill="#fff"/>
    <rect y="5" width="16" height="5" fill="#DC143C"/>
  </svg>`,

  BGN: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2">
    <rect width="3" height="2" fill="#fff"/>
    <rect y="0.667" width="3" height="0.667" fill="#00966E"/>
    <rect y="1.334" width="3" height="0.666" fill="#D62612"/>
  </svg>`,

  TRY: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20">
    <rect width="30" height="20" fill="#E30A17"/>
    <circle cx="12" cy="10" r="6.5" fill="#fff"/>
    <circle cx="14" cy="10" r="5.2" fill="#E30A17"/>
  </svg>`,

  HUF: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2">
    <rect width="3" height="2" fill="#CE2939"/>
    <rect y="0.667" width="3" height="0.667" fill="#fff"/>
    <rect y="1.334" width="3" height="0.666" fill="#477050"/>
  </svg>`
};

let CURRENCIES = [
  { code:'EUR', buy:5.1260, sell:5.2100 },
  { code:'USD', buy:4.3340, sell:4.4440 },
  { code:'GBP', buy:5.8230, sell:6.0400 },
  { code:'CHF', buy:5.5970, sell:5.7100 },
  { code:'CAD', buy:3.0750, sell:3.3000 },
  { code:'AUD', buy:2.7620, sell:3.1000 },
  { code:'PLN', buy:1.1450, sell:1.2200 },
  { code:'BGN', buy:2.2500, sell:2.6660 },
  { code:'TRY', buy:0.0950, sell:0.1190 },
  { code:'HUF', buy:0.0130, sell:0.0141 },
];

onValue(ratesRef, (snapshot) => {
  const data = snapshot.val();
  if (data && Array.isArray(data)) {
    data.forEach(r => {
      const idx = CURRENCIES.findIndex(c => c.code === r.code);
      if (idx >= 0) {
        CURRENCIES[idx].buy = r.buy;
        CURRENCIES[idx].sell = r.sell;
        const buyEl = document.getElementById('buy-' + idx);
        const sellEl = document.getElementById('sell-' + idx);
        if (buyEl) { buyEl.textContent = r.buy.toFixed(4); sellEl.textContent = r.sell.toFixed(4); }
      }
    });
    const now = new Date();
    document.getElementById('syncStatus').textContent = `actualizat ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }
});

function renderDisplay() {
  const table = document.getElementById('ratesTable');
  table.innerHTML = '';
  CURRENCIES.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'rate-row';
    row.innerHTML = `
      <div class="currency-cell">
        <div class="flag-container">
          ${FLAGS[c.code] || ''}
          <div class="flag-text">${c.code}</div>
        </div>
      </div>
      <div class="rate-cell"><span class="rate-val buy" id="buy-${i}">${c.buy.toFixed(4)}</span></div>
      <div class="rate-cell"><span class="rate-val sell" id="sell-${i}">${c.sell.toFixed(4)}</span></div>
    `;
    table.appendChild(row);
  });
}

function renderAdmin() {
  const container = document.getElementById('adminRows');
  container.innerHTML = '';
  CURRENCIES.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'admin-row';
    row.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; font-weight:900; font-family:'Oswald';">
        <span>${c.code}</span>
      </div>
      <input type="number" class="admin-input" id="adm-buy-${i}" value="${c.buy.toFixed(4)}" step="0.0001">
      <input type="number" class="admin-input" id="adm-sell-${i}" value="${c.sell.toFixed(4)}" step="0.0001">
    `;
    container.appendChild(row);
  });
}

window.saveRates = async function() {
  const btn = document.getElementById('adminSaveBtn');
  btn.disabled = true;
  const newRates = CURRENCIES.map((c, i) => ({
    code: c.code,
    buy: parseFloat(document.getElementById('adm-buy-' + i).value) || c.buy,
    sell: parseFloat(document.getElementById('adm-sell-' + i).value) || c.sell,
  }));
  await set(ratesRef, newRates);
  btn.disabled = false;
  document.getElementById('saveConfirm').textContent = '✓ SALVAT!';
  document.getElementById('saveConfirm').className = 'save-confirm show ok';
  setTimeout(() => document.getElementById('saveConfirm').classList.remove('show'), 3000);
};

window.openPwd = function() { document.getElementById('pwd-overlay').classList.add('show'); };
window.closePwd = function() { document.getElementById('pwd-overlay').classList.remove('show'); };
window.checkPassword = function() {
  if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) {
    window.closePwd(); renderAdmin(); document.getElementById('admin').style.display = 'block';
  }
};
window.closeAdmin = function() { document.getElementById('admin').style.display = 'none'; };

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const days = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const months = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('datedisp').textContent = `${days[now.getDay()]} , ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

renderDisplay();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
